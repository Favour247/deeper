<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6C5CE7"/>
      <stop offset="100%" stop-color="#3D2B8A"/>
    </linearGradient>
    <linearGradient id="bubble" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#E8E4F8" stop-opacity="0.9"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#A29BFE"/>
      <stop offset="100%" stop-color="#6C5CE7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#74B9FF"/>
      <stop offset="100%" stop-color="#0984E3"/>
    </linearGradient>
    <linearGradient id="bar3" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#55EFC4"/>
      <stop offset="100%" stop-color="#00B894"/>
    </linearGradient>
    <linearGradient id="bar4" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FDCB6E"/>
      <stop offset="100%" stop-color="#E17055"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="130%" height="130%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#000" flood-opacity="0.15"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>

  <!-- Speech bubble body -->
  <g filter="url(#shadow)">
    <path d="
      M 100 140
      Q 100 100, 140 100
      L 372 100
      Q 412 100, 412 140
      L 412 300
      Q 412 340, 372 340
      L 220 340
      L 160 400
      L 170 340
      L 140 340
      Q 100 340, 100 300
      Z
    " fill="url(#bubble)"/>
  </g>

  <!-- Analytics bars inside bubble -->
  <!-- Bar 1 - shortest -->
  <rect x="152" y="248" width="36" height="60" rx="8" fill="url(#bar1)"/>
  <!-- Bar 2 - medium -->
  <rect x="206" y="198" width="36" height="110" rx="8" fill="url(#bar2)"/>
  <!-- Bar 3 - tallest -->
  <rect x="260" y="158" width="36" height="150" rx="8" fill="url(#bar3)"/>
  <!-- Bar 4 - medium-tall -->
  <rect x="314" y="178" width="36" height="130" rx="8" fill="url(#bar4)"/>

  <!-- Trend line connecting bar tops -->
  <polyline
    points="170,248 224,198 278,158 332,178"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="3.5"
    stroke-linecap="round"
    stroke-linejoin="round"
    opacity="0.6"
  />

  <!-- Dots on trend line -->
  <circle cx="170" cy="248" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="224" cy="198" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="278" cy="158" r="5" fill="#FFFFFF" opacity="0.8"/>
  <circle cx="332" cy="178" r="5" fill="#FFFFFF" opacity="0.8"/>
</svg>
